<head>

    <title>Guest List - Elegance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <header>
            <h1>Lista de Convidados</h1>

        <nav class="menu">

        </nav>

        <section class="stats" id="stats">
            </section>

        <ul id="listaExibicao" class="guest-list">
            </ul>
