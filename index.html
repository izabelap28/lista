<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Convidados</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
  <h1>Lista de Convidados</h1>

  <input type="text" id="novoNome" placeholder="Digite um nome">

  <div class="buttons">
    <button id="btnAdicionar">Adicionar Nome</button>
    <button id="btnRemover">Remover Nome</button>
    <button id="btnMaiusculo">Nomes em MAIÚSCULO</button>
    <button id="btnA">Contar nomes com A</button>
    <button id="btnLongos">Nomes (+5 letras)</button>
    <button id="btnOrdenar">Ordenar A → Z</button>
    <button id="btnTotal">Quantidade Total</button>
    <button id="btnLimpar">Limpar Resultado</button>
  </div>

  <div id="resultado" class="resultado"></div>
</main>

<script src="script.js"></script>
</body>
</html>
