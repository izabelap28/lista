<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Menu de Organização</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
  <h1>Organizar Convidados</h1>

  <div class="menu">
    <select id="opcao">
      <option value="">Escolha uma opção</option>
      <option value="maiusculo">Deixar MAIÚSCULO</option>
      <option value="minusculo">Deixar minúsculo</option>
      <option value="az">Ordem A-Z</option>
      <option value="za">Ordem Z-A</option>
      <option value="letras">Mostrar quantidade de letras</option>
      <option value="longos">Apenas +5 letras</option>
      <option value="comA">Apenas com A</option>
    </select>

    <button id="executar">Executar</button>
  </div>

  <ul id="lista" class="lista"></ul>

</main>

<script src="script.js"></script>
</body>
</html>
