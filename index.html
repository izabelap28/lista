<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Convidados</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
  <h1>Lista de Convidados</h1>

  <div class="stats">
    <div class="card">
      <span>Total</span>
      <h2 id="totalCard">0</h2>
    </div>
    <div class="card">
      <span>Com A</span>
      <h2 id="aCard">0</h2>
    </div>
    <div class="card">
      <span>+5 Letras</span>
      <h2 id="longosCard">0</h2>
    </div>
  </div>

  <div class="buttons">
    <button id="btnMaiusculo">MAIÚSCULO</button>
    <button id="btnOrdenar">Ordenar</button>
    <button id="btnInverter">Inverter</button>
  </div>

  <ul id="lista" class="lista"></ul>

</main>

<script src="script.js"></script>
</body>
</html>
